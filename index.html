<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NGL Style Form</title>
    <style>
      /* Reset */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #f9a8d4, #c084fc);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }

      .card {
        background: #fff;
        width: 100%;
        max-width: 400px;
        padding: 25px 20px;
        border-radius: 16px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        text-align: center;
        animation: fadeIn 0.6s ease;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      h2 {
        font-size: 1.5rem;
        margin-bottom: 10px;
        color: #333;
      }

      p {
        font-size: 0.95rem;
        color: #666;
        margin-bottom: 20px;
      }

      textarea {
        width: 100%;
        height: 120px;
        resize: none;
        border-radius: 12px;
        border: 1px solid #ddd;
        padding: 12px;
        font-size: 1rem;
        outline: none;
        transition: border 0.2s ease;
      }

      textarea:focus {
        border-color: #c084fc;
        box-shadow: 0 0 0 3px rgba(192, 132, 252, 0.3);
      }

      button {
        width: 100%;
        background: linear-gradient(135deg, #ec4899, #8b5cf6);
        color: #fff;
        font-weight: bold;
        font-size: 1rem;
        border: none;
        border-radius: 12px;
        padding: 12px;
        margin-top: 15px;
        cursor: pointer;
        transition: transform 0.15s ease, box-shadow 0.15s ease;
      }

      button:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 15px rgba(0, 0, 0, 0.15);
      }

      .msg {
        margin-top: 15px;
        font-size: 0.95rem;
      }
      .success {
        color: green;
      }
      .error {
        color: red;
      }

      @media (max-width: 480px) {
        h2 {
          font-size: 1.3rem;
        }
        textarea {
          height: 100px;
        }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>Gabakal Tau ✨</h2>
      <!-- UBAH USERNAME KAMU DISINI -->
      <p>Kirim pesan anonim, jawaban akan dikirim ke Andy.</p>
      <!-- UBAH USERNAME KAMU DISINI -->
      <form id="nglForm">
        <textarea
          id="message"
          name="message"
          placeholder="Tulis pesanmu di sini..."
          required
        ></textarea>
        <button type="submit">Kirim</button>
      </form>
      <div class="msg" id="responseMsg"></div>
    </div>

    <script>
      document
        .getElementById("nglForm")
        .addEventListener("submit", async function (e) {
          e.preventDefault();

          const messageEl = document.getElementById("message");
          const responseMsg = document.getElementById("responseMsg");

          const data = {
            pesan: messageEl.value,
          };

          try {
            const res = await fetch(
              "https://c14d-140-213-105-161.ngrok-free.app/webhook-test/ngl",
              {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data),
              }
            );

            if (res.ok) {
              responseMsg.textContent = "✅ Pesan berhasil dikirim!";
              responseMsg.className = "msg success";
              messageEl.value = "";
            } else {
              responseMsg.textContent = "❌ Gagal mengirim pesan.";
              responseMsg.className = "msg error";
            }
          } catch (err) {
            responseMsg.textContent = "⚠️ Error: " + err.message;
            responseMsg.className = "msg error";
          }
        });
    </script>
  </body>
</html>
